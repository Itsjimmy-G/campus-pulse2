{% extends "base.html" %}
{% block content %}
<div class="relative -mx-4 sm:-mx-6 lg:-mx-8 px-4 sm:px-6 lg:px-8 py-16">
  <div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-cyan-900 to-emerald-700"></div>
  <div class="absolute -top-20 -left-20 w-72 h-72 bg-emerald-400/20 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-cyan-400/20 rounded-full blur-3xl"></div>
  <div class="relative max-w-7xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
      <div>
        <h1 class="text-6xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
          Create your account
        </h1>
        <p class="mt-6 text-slate-200 text-lg">
          Join and organize beautiful campus events with ease.
        </p>
      </div>
      <div>
        <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-8">
          <form method="post" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="relative">
              <input name="full_name" type="text" required class="peer w-full bg-white border border-slate-300 text-slate-900 placeholder-slate-500 rounded-lg p-3 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500 caret-emerald-600" placeholder="Full Name">
              <label class="pointer-events-none absolute left-3 -top-2.5 px-2 py-0.5 text-xs font-semibold text-white bg-slate-900/50 backdrop-blur-sm rounded-md transition-all peer-placeholder-shown:top-3 peer-placeholder-shown:text-base peer-placeholder-shown:bg-transparent peer-placeholder-shown:text-white/80 peer-focus:-top-2.5 peer-focus:text-xs peer-focus:bg-slate-900/50 peer-[&:not(:placeholder-shown)]:-top-2.5 peer-[&:not(:placeholder-shown)]:text-xs">Full Name</label>
            </div>
            <div class="relative">
              <input name="email" type="email" required class="peer w-full bg-white border border-slate-300 text-slate-900 placeholder-slate-500 rounded-lg p-3 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500 caret-emerald-600" placeholder="Email">
              <label class="pointer-events-none absolute left-3 -top-2.5 px-2 py-0.5 text-xs font-semibold text-white bg-slate-900/50 backdrop-blur-sm rounded-md transition-all peer-placeholder-shown:top-3 peer-placeholder-shown:text-base peer-placeholder-shown:bg-transparent peer-placeholder-shown:text-white/80 peer-focus:-top-2.5 peer-focus:text-xs peer-focus:bg-slate-900/50 peer-[&:not(:placeholder-shown)]:-top-2.5 peer-[&:not(:placeholder-shown)]:text-xs">Email</label>
            </div>
            <div class="relative">
              <input name="password" type="password" required minlength="8" class="peer w-full bg-white border border-slate-300 text-slate-900 placeholder-slate-500 rounded-lg p-3 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500 caret-emerald-600" placeholder="Password">
              <label class="pointer-events-none absolute left-3 -top-2.5 px-2 py-0.5 text-xs font-semibold text-white bg-slate-900/50 backdrop-blur-sm rounded-md transition-all peer-placeholder-shown:top-3 peer-placeholder-shown:text-base peer-placeholder-shown:bg-transparent peer-placeholder-shown:text-white/80 peer-focus:-top-2.5 peer-focus:text-xs peer-focus:bg-slate-900/50 peer-[&:not(:placeholder-shown)]:-top-2.5 peer-[&:not(:placeholder-shown)]:text-xs">Password</label>
              <p class="text-xs text-white/80 mt-2">Minimum 8 characters.</p>
            </div>
            <div>
              <label class="block text-sm font-semibold text-white mb-1">Role</label>
              <select name="role" class="w-full bg-white/80 border border-slate-300 text-slate-900 rounded-lg p-3 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500">
                <option value="student">Student</option>
                <option value="organizer">Event Organizer</option>
              </select>
            </div>
            <div class="flex items-center justify-between">
              <button type="submit" class="btn btn-primary">Register</button>
              <a href="{{ url_for('auth.login') }}" class="text-sm text-white/80 hover:text-white">Already have an account? Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  </div>
{% endblock %}
